# ci: every optional feature enabled to exercise all templates
secrets:
  data:
    API_SERVER_KEY: "ci-test-key-123456"
    ANTHROPIC_API_KEY: "sk-ant-ci-dummy"
    HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "ci-dashboard-pass"
dashboard:
  enabled: true
  auth:
    basicAuthUsername: admin
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: hermes.ci.local
      paths:
        - path: /
          pathType: Prefix
          backend: dashboard
        - path: /v1
          pathType: Prefix
          backend: api
networkPolicy:
  enabled: true
podDisruptionBudget:
  enabled: true
  minAvailable: 0
serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
persistence:
  data:
    size: 1Gi
  workspace:
    size: 1Gi
config:
  values:
    model:
      default: anyrouter/agent
      provider: custom
      api_key: ${ANYROUTER_API_KEY}
      base_url: ${ANYROUTER_API_BASE}
    custom_providers:
      - name: anyrouter
        base_url: https://anyrouter.dev/api/v1
        api_key: ${ANYROUTER_API_KEY}
        model: google/gemma-4-26b-a4b-it
        api_mode: chat_completions
    fallback_providers:
      - provider: openrouter
        model: openrouter/free
        base_url: https://openrouter.ai/api/v1
        api_mode: chat_completions
    display:
      personality: "You are a helpful CI assistant."
      busy_input_mode: steer
      busy_ack_enabled: true
    approvals:
      mode: manual
    terminal:
      backend: local
    security:
      allow_private_urls: true
    web:
      backend: firecrawl
    browser:
      inactivity_timeout: 120
      dialog_policy: must_respond
    code_execution:
      mode: project
      timeout: 300
      max_tool_calls: 50
    discord:
      require_mention: true
      auto_thread: true
    voice:
      enabled: true
    tts:
      enabled: true
    stt:
      enabled: true
    file_read_max_chars: 50000
    compression:
      enabled: true
      threshold: 80000
      target_ratio: 0.5
      protect_last_n: 20
      protect_first_n: 5
    max_concurrent_sessions: 3
    mcp_servers:
      - name: test-filesystem
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
      - name: test-sse
        url: https://example.com/mcp
        headers:
          Authorization: "Bearer ${TEST_MCP_TOKEN}"
    skills:
      external_dirs:
        - /hermes/skills
    always_load:
      - test_skill
    toolsets: []
    kanban:
      dispatch_in_gateway: true
      dispatch_interval_seconds: 60
      auto_decompose: true
      failure_limit: 2
    auxiliary:
      compression:
        provider: openrouter
        model: google/gemma-3-27b-it
        api_key: ${OPENROUTER_API_KEY}
        base_url: https://openrouter.ai/api/v1
        api_mode: chat_completions
