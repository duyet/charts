{{- if .Values.config.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hermes-agent.fullname" . }}-config
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
data:
  config.yaml: |
  {{- if .Values.config.content }}
    {{- .Values.config.content | nindent 4 }}
  {{- else }}
    {{- include "hermes-agent.config" . | nindent 4 }}
  {{- end }}
{{- end }}
