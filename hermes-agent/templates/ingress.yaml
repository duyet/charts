{{- if .Values.ingress.enabled -}}
{{- $fullName := include "hermes-agent.fullname" . -}}
{{- $apiPort := .Values.service.apiPort -}}
{{- $dashboardPort := .Values.service.dashboardPort -}}
apiVersion: {{ include "hermes-agent.ingressApiVersion" . }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ if eq (.backend | default "dashboard") "api" }}{{ $apiPort }}{{ else }}{{ $dashboardPort }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
