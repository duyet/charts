apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "hermes-agent.fullname" . }}-test-connection"
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health
      image: busybox:stable
      command:
        - /bin/sh
        - -c
        - |
          set -e
          {{- if .Values.apiServer.enabled }}
          echo "Checking gateway /health on api port {{ .Values.service.apiPort }}..."
          wget -q -O- "http://{{ include "hermes-agent.fullname" . }}:{{ .Values.service.apiPort }}/health"
          {{- else if .Values.dashboard.enabled }}
          echo "Checking dashboard TCP on port {{ .Values.service.dashboardPort }}..."
          wget -q -O- "http://{{ include "hermes-agent.fullname" . }}:{{ .Values.service.dashboardPort }}/" || true
          {{- else }}
          echo "Nothing to test (apiServer and dashboard both disabled)."
          {{- end }}
