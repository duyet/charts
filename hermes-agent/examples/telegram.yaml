# Preset: Telegram chat platform — connect Hermes to a Telegram bot.
# Bot token required (create bot via @BotFather on Telegram). Set
# TELEGRAM_BOT_TOKEN in secrets.data. Optionally restrict access to specific
# user IDs with TELEGRAM_ALLOWED_USERS (comma-separated numeric IDs).
#
#   helm upgrade --install hermes . -n hermes-agent --create-namespace \
#     -f examples/telegram.yaml
secrets:
  data:
    API_SERVER_KEY: "change-me-min-8-chars"
    OPENROUTER_API_KEY: "sk-or-..."
    TELEGRAM_BOT_TOKEN: "123456:ABC-DEF..."  # Your Telegram bot token from @BotFather
    # Optional: restrict access to specific Telegram user IDs
    # TELEGRAM_ALLOWED_USERS: "123456789,987654321"

config:
  values:
    model:
      default: openrouter/anthropic/claude-sonnet-4
      provider: openrouter
      api_key: ${OPENROUTER_API_KEY}
    display:
      personality: "You are a helpful AI assistant available via Telegram."
