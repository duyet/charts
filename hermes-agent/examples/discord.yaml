# Preset: Discord chat platform — connect Hermes to a Discord guild.
# Bot token required (create app at https://discord.com/developers/applications).
# Set DISCORD_BOT_TOKEN in secrets.data; adjust require_mention and channels.
#
#   helm upgrade --install hermes . -n hermes-agent --create-namespace \
#     -f examples/discord.yaml
secrets:
  data:
    API_SERVER_KEY: "change-me-min-8-chars"
    OPENROUTER_API_KEY: "sk-or-..."
    DISCORD_BOT_TOKEN: "MTAw..."  # Your Discord bot token

config:
  values:
    model:
      default: openrouter/anthropic/claude-sonnet-4
      provider: openrouter
      api_key: ${OPENROUTER_API_KEY}
    discord:
      require_mention: true       # only respond when @mentioned
      free_response_channels: ""  # empty = all channels require mention
      auto_thread: true          # thread replies in busy channels
