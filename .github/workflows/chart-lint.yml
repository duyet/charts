name: Chart Lint

on: [push, pull_request]

jobs:
  chart-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      # Force running all charts on master branch
      # --all Disables changed charts detection and version increment checking
      CT_ALL: ${{ github.ref == 'refs/heads/master' }}

    # Multiple KinD version
    strategy:
      fail-fast: false
      matrix:
        helm_version: [v3.14.0]
        # Updated to stable, tested Kubernetes versions with confirmed kubectl availability
        k8s_version: [v1.27.16, v1.28.13, v1.29.10, v1.30.6, v1.31.2]

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Fetch history
        run: git fetch --prune --unshallow

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ matrix.helm_version }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/ct-lint.yaml | grep -v '^>>>' | tr '\n' ' ')
          echo "list_changed=$changed" >> $GITHUB_ENV
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "list=$changed" >> $GITHUB_OUTPUT
          fi

      - name: Update dependencies
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add stable https://charts.helm.sh/stable
          helm repo add bitnami https://charts.bitnami.com/bitnami
          for chart in $list_changed; do
            echo "Updating dependencies for $chart..."
            helm dependency update "$chart"
          done

      - name: Comment
        uses: peter-evans/create-or-update-comment@v5
        id: comment
        if: ${{ github.event.pull_request.number }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Testing on Kubernetes **${{ matrix.k8s_version }}**, Helm **${{ matrix.helm_version }}** ... [(Run ${{ github.run_id }})](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            ${{ env.list_changed }}

      - name: Run chart-testing (lint)
        id: lint
        run: |
          set +e
          output=$(ct lint --config .github/ct-lint.yaml 2>&1)
          exit_code=$?
          set -e

          {
            echo 'LINT_STATUS<<EOF'
            echo "$output"
            echo 'EOF'
          } >> $GITHUB_ENV

          # Also add to step summary
          {
            echo '## Chart Linting Results'
            echo '```'
            echo "$output"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

          exit $exit_code

      - name: Comment (after ct lint successfully)
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ success() && github.event.pull_request.number }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.comment.outputs.comment-id }}
          edit-mode: append
          body: |
            <details>
              <summary>Linting chart successfully :rocket:.</summary>

              ```
              ${{ env.LINT_STATUS }}
              ```
            </details>

      - name: Comment (after ct lint failure)
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ failure() && github.event.pull_request.number }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.comment.outputs.comment-id }}
          edit-mode: append
          reactions: -1
          body: |
            <details>
              <summary>Linting chart failure! :no_good:</summary>

              ```
              ${{ env.LINT_STATUS }}
              ```
            </details>

      - name: Comment (before create KinD cluster)
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ github.event.pull_request.number }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.comment.outputs.comment-id }}
          edit-mode: append
          body: |
            Creating KinD cluster ${{ matrix.kubectl_version }} ...<br />

      - name: Create KinD cluster
        uses: helm/kind-action@v1.14.0
        with:
          kubectl_version: ${{ matrix.k8s_version }}
          node_image: kindest/node:${{ matrix.k8s_version }}
        # if: steps.list-changed.outputs.changed == 'true'

      - name: Comment (after create KinD successfully)
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ success() && github.event.pull_request.number }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.comment.outputs.comment-id }}
          edit-mode: append
          reactions: rocket
          body: |
            Created KinD cluster ${{ matrix.k8s_version }} successfully.<br />
            Installing charts and validating ...<br /><br />

      - name: Run chart-testing (install)
        id: ct
        run: |
          set +e
          output=$(ct install --config .github/ct-install.yaml 2>&1)
          exit_code=$?
          set -e

          {
            echo 'TEST_STATUS<<EOF'
            echo "$output"
            echo 'EOF'
          } >> "$GITHUB_ENV"

          # Also add to step summary
          {
            echo '## Chart Installation Test Results'
            echo '```'
            echo "$output"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

          exit $exit_code

      - name: Run kubeconform
        uses: nlamirault/helm-kubeconform-action@v0.2.0
        id: kubeconform
        with:
          charts: .

      - name: Comment (after test success)
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ success() && github.event.pull_request.number }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.comment.outputs.comment-id }}
          edit-mode: append
          reactions: hooray
          body: |
            <details>
              <summary>Testing chart result </summary>

              ```
              ${{ env.TEST_STATUS }}
              ```
            </details>

      - name: Comment (after test failure)
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ failure() && github.event.pull_request.number }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.comment.outputs.comment-id }}
          edit-mode: append
          reactions: -1
          body: |
            <details>
              <summary>Testing chart failure! :no_good:</summary>

              ```
              ${{ env.TEST_STATUS }}
              ```
            </details>
